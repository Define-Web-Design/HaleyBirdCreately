<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Code Snippet - Creately</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 20px;
    }
    h1 { color: #2563eb; }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
    }
    textarea {
      min-height: 200px;
      font-family: 'SFMono-Regular', Consolas, monospace;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .error {
      color: #dc2626;
      margin-top: 8px;
    }
    .success {
      color: #059669;
      margin-top: 8px;
    }
    .header-links {
      display: flex;
      gap: 20px;
    }
    .header-links a {
      color: #2563eb;
      text-decoration: none;
    }
    .header-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Create New Code Snippet</h1>
    <div class="header-links">
      <a href="/">Home</a>
      <a href="/create-snippet.html">Create Snippet</a>
    </div>
  </header>

  <main>
    <form id="snippetForm">
      <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required>
      </div>

      <div class="form-group">
        <label for="language">Programming Language</label>
        <select id="language" name="language">
          <option value="plaintext">Plain Text</option>
          <option value="javascript">JavaScript</option>
          <option value="typescript">TypeScript</option>
          <option value="jsx">JSX / React</option>
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="php">PHP</option>
          <option value="csharp">C#</option>
          <option value="cpp">C++</option>
          <option value="go">Go</option>
          <option value="ruby">Ruby</option>
          <option value="bash">Bash</option>
          <option value="sql">SQL</option>
          <option value="markdown">Markdown</option>
          <option value="json">JSON</option>
        </select>
      </div>

      <div class="form-group">
        <label for="code">Code</label>
        <textarea id="code" name="code" required placeholder="Paste your code here..."></textarea>
      </div>

      <div class="form-group">
        <label for="description">Description (optional)</label>
        <textarea id="description" name="description" rows="3" placeholder="Add a description of what this code does"></textarea>
      </div>

      <div class="form-group">
        <label for="author">Author</label>
        <input type="text" id="author" name="author" placeholder="Your name or username">
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="isPublic" name="isPublic" checked>
          Make this snippet public
        </label>
      </div>

      <button type="submit">Create Snippet</button>
      <div id="result"></div>
    </form>
  </main>

  <script>
    document.getElementById('snippetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = 'Creating snippet...';
      resultDiv.className = '';
      
      const formData = {
        title: document.getElementById('title').value,
        language: document.getElementById('language').value,
        code: document.getElementById('code').value,
        description: document.getElementById('description').value,
        author: document.getElementById('author').value || 'Anonymous',
        isPublic: document.getElementById('isPublic').checked
      };
      
      try {
        const response = await fetch('/api/snippets', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(formData),
        });
        
        if (!response.ok) {
          throw new Error(`Error: ${response.status}`);
        }
        
        const data = await response.json();
        
        resultDiv.textContent = `Snippet created successfully! Share ID: ${data.snippet.shareId}`;
        resultDiv.className = 'success';
        
        // Create share link
        const shareLink = document.createElement('div');
        shareLink.style.marginTop = '10px';
        
        const linkElement = document.createElement('a');
        linkElement.href = `/view/${data.snippet.shareId}`;
        linkElement.textContent = `View Snippet: ${window.location.origin}/view/${data.snippet.shareId}`;
        linkElement.target = '_blank';
        
        shareLink.appendChild(linkElement);
        resultDiv.appendChild(shareLink);
        
        // Create copy button
        const copyBtn = document.createElement('button');
        copyBtn.textContent = 'Copy Link';
        copyBtn.style.marginLeft = '10px';
        copyBtn.style.padding = '5px 10px';
        copyBtn.style.fontSize = '0.9rem';
        
        copyBtn.onclick = function() {
          navigator.clipboard.writeText(`${window.location.origin}/view/${data.snippet.shareId}`)
            .then(() => {
              copyBtn.textContent = 'Copied!';
              setTimeout(() => {
                copyBtn.textContent = 'Copy Link';
              }, 2000);
            })
            .catch(err => {
              console.error('Failed to copy link', err);
            });
        };
        
        shareLink.appendChild(copyBtn);
        
      } catch (error) {
        console.error('Error creating snippet:', error);
        resultDiv.textContent = `Error creating snippet: ${error.message}`;
        resultDiv.className = 'error';
      }
    });
  </script>
</body>
</html>
